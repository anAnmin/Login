<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<title>login</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="stylesheet" type="text/css" href="css/style.css" />
</head>

<body>
	<div id="wrap">
		<div id="top_content">
			<div id="header">
				<div id="rightheader">
					<p>
						2009/11/20
						<br />
					</p>
				</div>
				<div id="topheader">
					<h1 id="title">
						<a href="#">main</a>
					</h1>
				</div>
				<div id="navigation">
				</div>
			</div>
			<div id="content">
				<p id="whereami">
				</p>
				<h1>
					login
				</h1>
				<form action="emplist.html" method="post">
					<table cellpadding="0" cellspacing="0" border="0" class="form_table">
						<tr>
							<td valign="middle" align="right">
								username:
							</td>
							<td valign="middle" align="left">
								<input type="text" class="inputgri" name="name" id="username" />
							</td>
						</tr>
						<tr>
							<td valign="middle" align="right">
								password:
							</td>
							<td valign="middle" align="left">
								<input type="password" class="inputgri" name="pwd" id="password" />
							</td>
						</tr>

						<tr>
							<td valign="middle" align="right">
								验证码:
							</td>
							<td valign="middle" align="left">
								<input type="text" class="inputgri" id="captcha" style="width: 100px; display: inline-block;" />
								<img id="captchaImg" alt="验证码" onclick="refreshCaptcha()"
									style="height: 28px; vertical-align: middle; cursor: pointer; margin-left: 10px;" />
								<a href="javascript:refreshCaptcha()" style="margin-left: 5px; font-size: 12px;">换一张</a>
							</td>
						</tr>
					</table>
					<p>
						<input type="submit" class="button" value="Submit &raquo;" id="loginBtn" />
						&nbsp;&nbsp;
						<a href="regist.html">注册</a>
					</p>
				</form>
			</div>
		</div>
		<div id="footer">
			<div id="footer_bg">
				ABC@126.com
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script>
		let captchaKey = '';


		window.onload = function () {
			refreshCaptcha();
		}


		function refreshCaptcha() {
			axios.get('http://localhost:8989/captcha/generate')
				.then(res => {
					if (res.data.code === 200) {
						captchaKey = res.data.captchaKey;
						document.getElementById('captchaImg').src = 'data:image/png;base64,' + res.data.img;
					}
				})
				.catch(err => {
					alert('验证码加载失败！请检查后端是否启动');
				});
		}


		document.getElementById('loginBtn').onclick = function () {
			const username = document.getElementById('username').value.trim();
			const password = document.getElementById('password').value.trim();
			const captcha = document.getElementById('captcha').value.trim();

			if (!username || !password || !captcha) {
				alert('请填写完整信息');
				return false;
			}

			axios.post('http://localhost:8989/user/login', {
				username: username,
				password: password,
				captcha: captcha,
				captchaKey: captchaKey
			})
				.then(res => {
					if (res.data.code === 200) {
						alert('登录成功！');
						localStorage.setItem('token', res.data.token);
						localStorage.setItem('realname', res.data.realname);

						window.location.href = 'emplist.html';
					} else {
						alert(res.data.msg);
						refreshCaptcha();
					}
				})
				.catch(err => {
					alert('登录请求失败！请检查后端是否启动');
					refreshCaptcha();
				});

			return false;
		}
	</script>
</body>

</html>
