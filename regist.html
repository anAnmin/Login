<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<title>regist</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link rel="stylesheet" type="text/css" href="css/style.css" />
</head>

<body>
	<div id="wrap">
		<div id="top_content">
			<div id="header">
				<div id="rightheader">
					<p>
						2009/11/20
						<br />
					</p>
				</div>
				<div id="topheader">
					<h1 id="title">
						<a href="#">main</a>
					</h1>
				</div>
				<div id="navigation">
				</div>
			</div>
			<div id="content">
				<p id="whereami">
				</p>
				<h1>
					注册
				</h1>
				<form action="login.html" method="post">
					<table cellpadding="0" cellspacing="0" border="0" class="form_table">
						<tr>
							<td valign="middle" align="right">
								用户名:
							</td>
							<td valign="middle" align="left">
								<input type="text" class="inputgri" v-model="user.username" id="username" />
							</td>
						</tr>
						<tr>
							<td valign="middle" align="right">
								真实姓名:
							</td>
							<td valign="middle" align="left">
								<input type="text" class="inputgri" v-model="user.realname" id="realname" />
							</td>
						</tr>
						<tr>
							<td valign="middle" align="right">
								密码:
							</td>
							<td valign="middle" align="left">
								<input type="password" class="inputgri" v-model="user.password" id="password" />
							</td>
						</tr>
						<tr>
							<td valign="middle" align="right">
								性别:
							</td>
							<td valign="middle" align="left">
								男
								<input type="radio" class="inputgri" v-model="user.sex" value="男" checked="checked" />
								女
								<input type="radio" class="inputgri" v-model="user.sex" value="女" />
							</td>
						</tr>

						<tr>
							<td valign="middle" align="right">
								验证码:
							</td>
							<td valign="middle" align="left">
								<input type="text" v-model="code" class="inputgri" id="captcha" style="width: 100px;" />
							</td>
							<td>
								<img id="captchaImg" :src="url" alt="验证码" onclick="refreshCaptcha()"
									style="height: 28px; vertical-align: middle; cursor: pointer;" />
								<a href="javascript:refreshCaptcha()" style="margin-left: 5px; font-size: 12px;">换一张</a>
							</td>
						</tr>
					</table>
					<p>
						<input type="button" @click="register" class="button" value="Submit &raquo;" id="registBtn" />
						&nbsp;&nbsp;
						<a href="login.html">返回登录</a>
					</p>
				</form>
			</div>
		</div>
		<div id="footer">
			<div id="footer_bg">
				ABC@126.com
			</div>
		</div>
	</div>
</body>

</html>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script>
	let captchaKey = '';

	var app = new Vue({
		el: "#wrap",
		data: {
			user: {
				username: '',
				realname: '',
				password: '',
				sex: '男'
			},
			code: '',
			url: ''
		},
		methods: {
			refreshCaptcha: function () {
				axios.get('http://localhost:8989/captcha/generate')
					.then(res => {
						if (res.data.code === 200) {
							captchaKey = res.data.captchaKey;
							this.url = 'data:image/png;base64,' + res.data.img;
						}
					})
					.catch(err => {
						alert('验证码加载失败！请检查后端是否启动');
					});
			},

			register: function () {
				if (!this.user.username || !this.user.realname || !this.user.password || !this.code) {
					alert('请填写完整信息');
					return;
				}

				axios.post('http://localhost:8989/user/register', {
					username: this.user.username,
					realname: this.user.realname,
					password: this.user.password,
					sex: this.user.sex,
					captcha: this.code,
					captchaKey: captchaKey
				})
					.then(res => {
						if (res.data.code === 200) {
							alert('注册成功！请登录');
							window.location.href = 'login.html';
						} else {
							alert(res.data.msg);
							this.refreshCaptcha();
						}
					})
					.catch(err => {
						alert('注册请求失败！请检查后端是否启动');
						this.refreshCaptcha();
					});
			}
		},
		created() {
			this.refreshCaptcha();
		}
	})
	function refreshCaptcha() {
		app.refreshCaptcha();
	}
</script>
